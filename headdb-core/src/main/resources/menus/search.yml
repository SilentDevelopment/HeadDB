# Конфигурация меню результатов поиска
# Search results menu configuration

# Название меню (поддерживает MiniMessage формат)
# Menu title (supports MiniMessage format)
# {query} - поисковый запрос, {count} - количество результатов
# Примечание: title для search берется из messages/ (menu.search.name)
title: "<red>HeadDB <gray>» <gold>Поиск <gray>» <gold>{query}"

# Размер меню (количество строк: 1-6)
# Menu size (number of rows: 1-6)
size: 6

# Слоты для отображения результатов (начиная с 0)
# Slots for displaying results (starting from 0)
resultSlots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34, 37, 38, 39, 40, 41, 42, 43]

# Элементы управления
# Control buttons
controls:
  # Кнопка "Назад" (предыдущая страница)
  # Back button (previous page)
  back:
    enabled: true
    slot: 45
    material: "ARROW"
    name: "<gold>◀ Назад"
    lore:
      - "<gray>Перейти на предыдущую страницу: <green>${{BACK}}"
  
  # Информация о странице и результатах
  # Page and results info
  info:
    enabled: true
    slot: 49
    material: "PAPER"
    name: "<gold>ℹ Найдено: <green>{count}"
    lore:
      - "<gray>Страница: <green>${{CURRENT}}<gray>/<red>${{MAX}}"
      - ""
      - "<gray>Нажмите, чтобы вернуться в главное меню."
  
  # Кнопка "Далее" (следующая страница)
  # Next button (next page)
  next:
    enabled: true
    slot: 53
    material: "ARROW"
    name: "<gold>Далее ▶"
    lore:
      - "<gray>Перейти на следующую страницу: <green>${{NEXT}}"
  
  # Кнопка нового поиска
  # New search button
  newSearch:
    enabled: true
    slot: 48
    material: "COMPASS"
    name: "<green>Новый поиск"
    lore:
      - ""
      - "<gray>Нажмите, чтобы начать новый поиск"

# Заполнитель границ
# Border filler
border:
  enabled: true
  material: "GREEN_STAINED_GLASS_PANE"
  name: ""
  lore: []

# Настройки отображения результатов
# Result display settings
resultDisplay:
  # Показывать ID головы
  # Show head ID
  showId: true
  
  # Показывать категорию
  # Show category
  showCategory: true
  
  # Показывать теги
  # Show tags
  showTags: true
  
  # Показывать релевантность (если применимо)
  # Show relevance (if applicable)
  showRelevance: false
  
  # Формат описания результата
  # Result lore format
  loreFormat:
    - ""
    - "<gray>ID: <yellow>{id}"
    - "<gray>Категория: <gold>{category}"
    - "<gray>Теги: <aqua>{tags}"
    - ""
    - "<green>ЛКМ <gray>- Получить голову"
    - "<yellow>ПКМ <gray>- Добавить в избранное"

# Сообщение при отсутствии результатов
# No results message
noResultsMessage:
  enabled: true
  slot: 22
  material: "BARRIER"
  name: "<red>Ничего не найдено"
  lore:
    - ""
    - "<gray>По запросу <yellow>{query}"
    - "<gray>ничего не найдено"
    - ""
    - "<yellow>Попробуйте изменить запрос"

# Подсказки по поиску
# Search hints
searchHints:
  enabled: true
  slot: 50
  material: "BOOK"
  name: "<gold>💡 Подсказки по поиску"
  lore:
    - ""
    - "<gray>Используйте фильтры:"
    - "<yellow>category:<gold>Animals"
    - "<yellow>tag:<gold>red"
    - "<yellow>id:<gold>123"
    - ""
    - "<gray>Режимы поиска:"
    - "<yellow>mode:<gold>exact <gray>- точное совпадение"
    - "<yellow>mode:<gold>fuzzy <gray>- нечёткий поиск"
