name: Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing clean release tag to publish, for example 7.0.0-rc.1
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Paper plugin
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [[ "$tag" == v* ]]; then
            echo "Release tags must not start with v: ${tag}" >&2
            exit 1
          fi

          if [[ "$tag" != [0-9]* ]]; then
            echo "Release tags must start with a version number, for example 7.0.0-rc.1: ${tag}" >&2
            exit 1
          fi

          if [[ "$tag" == *+build.* ]]; then
            echo "Build metadata tags are not public releases: ${tag}" >&2
            exit 1
          fi

          git fetch --tags --force

          if ! git rev-parse -q --verify "${tag}^{commit}" >/dev/null; then
            echo "Tag does not exist: ${tag}" >&2
            exit 1
          fi

          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub Release already exists for tag: ${tag}" >&2
            exit 1
          fi

          git checkout --detach "$tag"

          commit="$(git rev-parse HEAD)"
          version="${tag}"
          base_version="$(mvn -B -ntp help:evaluate -Dexpression=project.version -q -DforceStdout)"

          if [[ "$base_version" == *-SNAPSHOT ]]; then
            echo "Snapshot versions are not released." >&2
            exit 1
          fi

          if [[ "$base_version" != "$version" ]]; then
            echo "Project version does not match release tag: project=${base_version}, tag=${version}" >&2
            exit 1
          fi

          github_prerelease="false"
          if [[ "$version" == *-* ]]; then
            github_prerelease="true"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          echo "github_prerelease=${github_prerelease}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Package Paper plugin
        shell: bash
        run: |
          set -euo pipefail

          mvn -B -ntp -U -pl headdb-platforms/headdb-paper -am clean package \
            -Dheaddb.build.version="${{ steps.meta.outputs.version }}" \
            -Dheaddb.build.base-version="${{ steps.meta.outputs.base_version }}" \
            -Dheaddb.build.number="${{ github.run_number }}" \
            -Dheaddb.build.attempt="${{ github.run_attempt }}" \
            -Dheaddb.build.commit="${{ steps.meta.outputs.commit }}" || {
              echo "Initial Maven build failed. Clearing potentially corrupted Maven Resolver artifact and retrying once."
              rm -rf "$HOME/.m2/repository/org/apache/maven/resolver/maven-resolver-named-locks/1.9.18"
              mvn -B -ntp -U -pl headdb-platforms/headdb-paper -am clean package \
                -Dheaddb.build.version="${{ steps.meta.outputs.version }}" \
                -Dheaddb.build.base-version="${{ steps.meta.outputs.base_version }}" \
                -Dheaddb.build.number="${{ github.run_number }}" \
                -Dheaddb.build.attempt="${{ github.run_attempt }}" \
                -Dheaddb.build.commit="${{ steps.meta.outputs.commit }}"
            }

      - name: Inspect packaged plugin
        shell: bash
        run: |
          set -euo pipefail

          jar_path="headdb-platforms/headdb-paper/target/HeadDB.jar"
          test -s "$jar_path"

          jar tf "$jar_path" | grep -Fxq 'paper-plugin.yml'
          jar tf "$jar_path" | grep -Fxq 'messages/en-US.yml'
          jar tf "$jar_path" | grep -Fxq 'gui.yml'
          jar tf "$jar_path" | grep -Fxq 'economy.yml'
          jar tf "$jar_path" | grep -Fxq 'git.properties'

          unzip -p "$jar_path" paper-plugin.yml > /tmp/paper-plugin.yml

          if grep -Eq '@project\.version@|\$\{project\.version\}|\$\{headdb\.build\.version\}' /tmp/paper-plugin.yml; then
            echo 'paper-plugin.yml version was not filtered.' >&2
            exit 1
          fi

          grep -Fq "main: io.github.silentdevelopment.headdb.paper.HeadDBPlugin" /tmp/paper-plugin.yml
          grep -Fq "api-version: '26.1.2'" /tmp/paper-plugin.yml
          grep -Fq 'Vault:' /tmp/paper-plugin.yml
          grep -Fq 'required: false' /tmp/paper-plugin.yml

          unzip -p "$jar_path" git.properties > /tmp/git.properties
          grep -Fq "headdb.build.version=${{ steps.meta.outputs.version }}" /tmp/git.properties
          grep -Fq "headdb.build.base-version=${{ steps.meta.outputs.base_version }}" /tmp/git.properties
          grep -Fq 'headdb.build.number=' /tmp/git.properties
          grep -Fq 'headdb.build.attempt=' /tmp/git.properties
          grep -Fq "headdb.build.commit=${{ steps.meta.outputs.commit }}" /tmp/git.properties

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          jar_name="HeadDB-${{ steps.meta.outputs.version }}.jar"
          jar_path="dist/${jar_name}"

          cp headdb-platforms/headdb-paper/target/HeadDB.jar "$jar_path"

          (
            cd dist
            sha256sum "$jar_name" > "${jar_name}.sha256"
          )

          echo "jar=${jar_path}" >> "$GITHUB_OUTPUT"
          echo "sha=${jar_path}.sha256" >> "$GITHUB_OUTPUT"

      - name: Resolve previous public release tag
        id: previous
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_tag="${{ steps.meta.outputs.tag }}"

          previous_tag="$(
            gh release list \
              --repo "${GITHUB_REPOSITORY}" \
              --limit 100 \
              --json tagName,isDraft,publishedAt \
              --jq '
                [
                  .[]
                  | select(.isDraft == false)
                  | select(.tagName != "'"${current_tag}"'")
                  | select(.tagName | contains("+build.") | not)
                ]
                | sort_by(.publishedAt)
                | reverse
                | .[0].tagName // ""
              '
          )"

          echo "tag=${previous_tag}" >> "$GITHUB_OUTPUT"

          if [[ -n "$previous_tag" ]]; then
            echo "Previous public release: ${previous_tag}"
          else
            echo "No previous public release found."
          fi

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          args=(
            repos/${GITHUB_REPOSITORY}/releases/generate-notes
            --method POST
            --field tag_name="${{ steps.meta.outputs.tag }}"
            --field target_commitish="${{ steps.meta.outputs.commit }}"
          )

          if [[ -n "${{ steps.previous.outputs.tag }}" ]]; then
            args+=(--field previous_tag_name="${{ steps.previous.outputs.tag }}")
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/contents/.github/release.yml?ref=${{ steps.meta.outputs.commit }}" >/dev/null 2>&1; then
            args+=(--field configuration_file_path=".github/release.yml")
          elif gh api "repos/${GITHUB_REPOSITORY}/contents/.github/release.yaml?ref=${{ steps.meta.outputs.commit }}" >/dev/null 2>&1; then
            args+=(--field configuration_file_path=".github/release.yaml")
          fi

          gh api "${args[@]}" > generated-release-notes.json
          jq -r '.body // ""' generated-release-notes.json > generated-body.md

          {
            echo "## ${{ steps.meta.outputs.version }}"
            echo
            echo "Built from tag: ${{ steps.meta.outputs.tag }}"
            echo "Commit: ${{ steps.meta.outputs.commit }}"
            echo
          } > release-notes.md

          cat generated-body.md >> release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          args=(
            "${{ steps.meta.outputs.tag }}"
            "${{ steps.assets.outputs.jar }}"
            "${{ steps.assets.outputs.sha }}"
            --repo "${GITHUB_REPOSITORY}"
            --target "${{ steps.meta.outputs.commit }}"
            --title "${{ steps.meta.outputs.version }}"
            --notes-file release-notes.md
          )

          if [[ "${{ steps.meta.outputs.github_prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"